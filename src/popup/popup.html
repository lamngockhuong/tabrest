<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>TabRest</title>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-title">
        <img src="../../icons/icon-48.png" alt="TabRest" class="header-logo">
        <h1><a href="https://tabrest.khuong.dev" target="_blank" rel="noopener noreferrer" class="header-link">TabRest</a></h1>
      </div>
      <div class="header-actions">
        <button id="theme-toggle" class="icon-btn" title="Toggle theme">
          <span id="theme-icon">🌙</span>
        </button>
        <button id="settings-btn" class="icon-btn" title="Settings">
          <span data-icon="settings"></span>
        </button>
      </div>
    </header>

    <!-- Review Prompt -->
    <div class="review-prompt" id="review-prompt" style="display: none;">
      <span class="review-prompt-text" data-i18n="enjoyingTabRest">Enjoying TabRest?</span>
      <div class="review-prompt-actions">
        <button class="review-btn review-yes" id="review-yes" title="Leave a review">
          <span data-icon="check"></span> <span data-i18n="yes">Yes!</span>
        </button>
        <button class="review-btn review-no" id="review-no" title="Report issue">
          <span data-icon="x"></span> <span data-i18n="notReally">Not really</span>
        </button>
      </div>
      <button class="review-dismiss" id="review-dismiss" title="Dismiss">
        <span data-icon="x"></span>
      </button>
    </div>

    <!-- Stats Strip -->
    <div class="stats-strip">
      <div class="strip-stat">
        <span class="strip-stat-value" id="stat-sleeping">0</span>
        <span class="strip-stat-label" data-i18n="sleeping">sleeping</span>
      </div>
      <div class="strip-divider"></div>
      <div class="strip-stat">
        <span class="strip-stat-value" id="stat-protected">0</span>
        <span class="strip-stat-label" data-i18n="protected">protected</span>
      </div>
      <div class="strip-divider"></div>
      <div class="strip-stat">
        <span class="strip-stat-value" id="stat-saved">—</span>
        <span class="strip-stat-label" data-i18n="saved">saved</span>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="quick-actions">
      <button class="btn btn-primary" id="unload-others">
        <span data-icon="pause"></span>
        <span data-i18n="unloadOthers">Unload Others</span>
      </button>
      <button class="btn" id="unload-current">
        <span data-icon="moon"></span>
        <span data-i18n="unloadCurrent">Unload Current</span>
      </button>
    </div>

    <!-- Tab Groups (if available) -->
    <div id="tab-groups-section" class="hidden">
      <select id="tab-group-select" class="select" style="flex: 1;">
        <option value="">Select Tab Group...</option>
      </select>
      <button id="unload-group" class="btn btn-sm">Unload Group</button>
    </div>

    <!-- Tab List -->
    <div class="collapsible-section">
      <div class="section-toggle" id="tabs-toggle" role="button" tabindex="0" aria-expanded="true">
        <span class="section-toggle-left">
          <span data-icon="layers"></span>
          <span data-i18n="tabsInWindow">Tabs in this window</span>
        </span>
        <span class="section-toggle-right">
          <button class="btn-icon small" id="copy-tabs" data-i18n-title="copyTabListTooltip" title="Copy tab list to clipboard">
            <span data-icon="clipboard"></span>
          </button>
          <button class="btn-icon small" id="refresh-tabs" title="Refresh">
            <span data-icon="refresh"></span>
          </button>
          <span class="section-chevron" data-icon="chevronRight"></span>
        </span>
      </div>
      <div class="section-body open" id="tabs-body">
        <div id="tab-list" class="tab-list"></div>
      </div>
    </div>

    <!-- Collapsible Settings -->
    <div class="collapsible-section">
      <button class="section-toggle" id="settings-toggle" aria-expanded="false">
        <span class="section-toggle-left">
          <span data-icon="settings"></span>
          <span data-i18n="quickSettings">Quick Settings</span>
        </span>
        <span class="section-chevron" data-icon="chevronRight"></span>
      </button>
      <div class="section-body" id="settings-body">
        <div class="section-body-inner">
          <div class="setting-row">
            <label data-i18n="autoUnloadAfter">Auto-unload after</label>
            <select id="timer-select" class="select">
              <option value="0" data-i18n="disabled">Disabled</option>
              <option value="15">15 minutes</option>
              <option value="30">30 minutes</option>
              <option value="60">1 hour</option>
              <option value="120">2 hours</option>
            </select>
          </div>
          <div class="setting-row">
            <label data-i18n="ramThreshold">RAM threshold</label>
            <select id="threshold-select" class="select">
              <option value="0" data-i18n="disabled">Disabled</option>
              <option value="70">70%</option>
              <option value="80">80%</option>
              <option value="90">90%</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- More Actions -->
    <div class="collapsible-section">
      <button class="section-toggle" id="more-toggle" aria-expanded="false">
        <span class="section-toggle-left">
          <span data-icon="zap"></span>
          <span data-i18n="moreActions">More Actions</span>
        </span>
        <span class="section-chevron" data-icon="chevronRight"></span>
      </button>
      <div class="section-body" id="more-body">
        <div class="section-body-inner">
          <div class="more-actions-grid">
            <button class="btn btn-sm" id="unload-right">
              <span>Unload Right →</span>
            </button>
            <button class="btn btn-sm" id="unload-left">
              <span>← Unload Left</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Sessions -->
    <div class="collapsible-section">
      <button class="section-toggle" id="sessions-toggle" aria-expanded="false">
        <span class="section-toggle-left">
          <span data-icon="folderOpen"></span>
          <span data-i18n="sessions">Sessions</span>
        </span>
        <span class="section-chevron" data-icon="chevronRight"></span>
      </button>
      <div class="section-body" id="sessions-body">
        <div class="section-body-inner">
          <div class="session-save-row">
            <input type="text" id="session-name-input" class="input" data-i18n-placeholder="sessionNamePlaceholder" placeholder="Session name (optional)">
            <button class="btn btn-sm" id="btn-save-session">
              <span data-icon="plus"></span>
              <span data-i18n="save">Save</span>
            </button>
          </div>
          <div class="session-list" id="session-list">
            <div class="empty-state" data-i18n="saveFirstSession">Save your first session</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="collapsible-section">
      <button class="section-toggle" id="stats-toggle" aria-expanded="false">
        <span class="section-toggle-left">
          <span data-icon="barChart"></span>
          <span data-i18n="stats">Stats</span>
        </span>
        <span class="section-chevron" data-icon="chevronRight"></span>
      </button>
      <div class="section-body" id="stats-body">
        <div class="section-body-inner">
          <div class="stats-grid">
            <div class="stat-card" data-i18n-title="tabsUnloadedToday" title="Tabs unloaded today">
              <span class="stat-card-label" data-i18n="today">Today</span>
              <span class="stat-card-value" id="stat-today">0</span>
            </div>
            <div class="stat-card" data-i18n-title="tabsUnloadedTotal" title="Total tabs unloaded">
              <span class="stat-card-label" data-i18n="allTime">All time</span>
              <span class="stat-card-value" id="stat-all-time">0</span>
            </div>
            <div class="stat-card">
              <span class="stat-card-label" data-i18n="ramSaved">RAM saved (est.)</span>
              <span class="stat-card-value" id="stat-ram">—</span>
            </div>
            <div class="stat-card">
              <span class="stat-card-label" data-i18n="memberSince">Member since</span>
              <span class="stat-card-value" id="stat-member-since">—</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <footer class="popup-footer">
      <span>TabRest v0.0.1</span>
    </footer>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="popup.js" type="module"></script>
</body>
</html>
