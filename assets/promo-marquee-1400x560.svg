<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 560" width="1400" height="560">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F0B1A"/>
      <stop offset="40%" style="stop-color:#1A1528"/>
      <stop offset="100%" style="stop-color:#312E81"/>
    </linearGradient>
    <radialGradient id="indigoGlow" cx="75%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4338CA;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#4338CA;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="circleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1400" height="560" fill="url(#bgGradient)"/>
  <rect width="1400" height="560" fill="url(#indigoGlow)"/>

  <!-- Decorative background circles -->
  <circle cx="180" cy="460" r="240" fill="url(#circleGlow)" opacity="0.5"/>
  <circle cx="1220" cy="100" r="160" fill="url(#circleGlow)" opacity="0.3"/>

  <!-- Left side: Marketing content -->
  <g transform="translate(80, 90)">
    <!-- Logo + Name -->
    <g transform="translate(0, 0)">
      <g transform="translate(0, 0) scale(0.42)">
        <!-- Shadow -->
        <g transform="translate(0, 12) scale(0.25)">
          <path fill="#8B5CF6" opacity="0.35" d="M433.79 59.602c-8.94.047-20.654 3.077-34.966 9.876C295.2 62.252 170.14 77.352 86.788 103.535c-60.407-27.913-70.404-.426-42.95 36.186C10.242 239.454 24.97 340.803 60.7 413.31c-11.01 47.633 16.965 45.498 41.172 26.452 170.77 9.1 281.83-16.52 349.88-68.666 24.01 19.23 41.66-6.006 31.868-36.856 11.922-71.81-9.07-167.31-36.093-233.78 13.362-23.473 8.022-40.975-13.737-40.858z"/>
        </g>
        <!-- Pillow -->
        <g transform="translate(-3, 8) scale(0.25)">
          <path fill="#DDD6FE" d="M433.79 59.602c-8.94.047-20.654 3.077-34.966 9.876C295.2 62.252 170.14 77.352 86.788 103.535c-60.407-27.913-70.404-.426-42.95 36.186C10.242 239.454 24.97 340.803 60.7 413.31c-11.01 47.633 16.965 45.498 41.172 26.452 170.77 9.1 281.83-16.52 349.88-68.666 24.01 19.23 41.66-6.006 31.868-36.856 11.922-71.81-9.07-167.31-36.093-233.78 13.362-23.473 8.022-40.975-13.737-40.858z"/>
          <path fill="#A78BFA" opacity="0.35" d="M76.404 137.562c52.65 61.045 53.612 200.38 21.748 283.403 7.046-90.91 2.505-223.673-21.748-283.404z"/>
        </g>
        <!-- Zzz -->
        <g fill="#7C3AED" font-family="Arial Black, Arial, sans-serif" font-style="italic" font-weight="900">
          <text x="70" y="40" font-size="30">z</text>
          <text x="90" y="26" font-size="22">z</text>
          <text x="106" y="14" font-size="15">z</text>
        </g>
      </g>
      <text x="65" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="600" fill="#818CF8">TabRest</text>
    </g>

    <!-- Main headline -->
    <text x="0" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#ffffff">
      Save up to
    </text>
    <text x="0" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#818CF8">
      80% RAM
    </text>

    <!-- Subheadline -->
    <text x="0" y="232" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#9B8FAD">
      Rest your tabs, free your RAM
    </text>

    <!-- Feature list -->
    <g transform="translate(0, 280)">
      <g transform="translate(0, 0)">
        <circle cx="11" cy="11" r="11" fill="rgba(99,102,241,0.2)"/>
        <text x="11" y="15" font-family="system-ui, sans-serif" font-size="11" fill="#6366F1" text-anchor="middle">✓</text>
        <text x="32" y="16" font-family="system-ui, sans-serif" font-size="15" fill="#E8E2F4">Auto-unload inactive tabs</text>
      </g>
      <g transform="translate(330, 0)">
        <circle cx="11" cy="11" r="11" fill="rgba(99,102,241,0.2)"/>
        <text x="11" y="15" font-family="system-ui, sans-serif" font-size="11" fill="#6366F1" text-anchor="middle">✓</text>
        <text x="32" y="16" font-family="system-ui, sans-serif" font-size="15" fill="#E8E2F4">Smart RAM monitoring</text>
      </g>
      <g transform="translate(0, 38)">
        <circle cx="11" cy="11" r="11" fill="rgba(99,102,241,0.2)"/>
        <text x="11" y="15" font-family="system-ui, sans-serif" font-size="11" fill="#6366F1" text-anchor="middle">✓</text>
        <text x="32" y="16" font-family="system-ui, sans-serif" font-size="15" fill="#E8E2F4">Save &amp; restore sessions</text>
      </g>
      <g transform="translate(330, 38)">
        <circle cx="11" cy="11" r="11" fill="rgba(99,102,241,0.2)"/>
        <text x="11" y="15" font-family="system-ui, sans-serif" font-size="11" fill="#6366F1" text-anchor="middle">✓</text>
        <text x="32" y="16" font-family="system-ui, sans-serif" font-size="15" fill="#E8E2F4">Privacy-first, local data</text>
      </g>
    </g>
  </g>

  <!-- Right side: PLACEHOLDER for popup screenshot -->
  <g transform="translate(820, 60)">
    <rect x="0" y="0" width="500" height="440" rx="16" fill="rgba(26,21,40,0.8)" stroke="#4338CA" stroke-width="3" stroke-dasharray="12,6"/>
    <text x="250" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#6366F1" text-anchor="middle" opacity="0.85">
      □ SCREENSHOT PLACEHOLDER
    </text>
    <text x="250" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#9B8FAD" text-anchor="middle">
      Insert popup screenshot here
    </text>
    <text x="250" y="256" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#9B8FAD" text-anchor="middle" opacity="0.6">
      Recommended: 500 x 440 px
    </text>
    <!-- Corner guides -->
    <path d="M 20 0 L 0 0 L 0 20" fill="none" stroke="#818CF8" stroke-width="2"/>
    <path d="M 480 0 L 500 0 L 500 20" fill="none" stroke="#818CF8" stroke-width="2"/>
    <path d="M 0 420 L 0 440 L 20 440" fill="none" stroke="#818CF8" stroke-width="2"/>
    <path d="M 500 420 L 500 440 L 480 440" fill="none" stroke="#818CF8" stroke-width="2"/>
  </g>
</svg>
