<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <defs>
    <linearGradient id="bgGradient" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="50%" style="stop-color:#1A1528"/>
      <stop offset="100%" style="stop-color:#0F0B1A"/>
    </linearGradient>
    <radialGradient id="leftGlow" cx="20%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#4338CA;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#4338CA;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="url(#bgGradient)"/>
  <rect width="1280" height="800" fill="url(#leftGlow)"/>

  <!-- Left side: Content -->
  <g transform="translate(80, 180)">
    <!-- Logo -->
    <g transform="translate(0, 0)">
      <g transform="scale(0.4)">
        <g transform="translate(0, 12) scale(0.25)">
          <path fill="#8B5CF6" opacity="0.35" d="M433.79 59.602c-8.94.047-20.654 3.077-34.966 9.876C295.2 62.252 170.14 77.352 86.788 103.535c-60.407-27.913-70.404-.426-42.95 36.186C10.242 239.454 24.97 340.803 60.7 413.31c-11.01 47.633 16.965 45.498 41.172 26.452 170.77 9.1 281.83-16.52 349.88-68.666 24.01 19.23 41.66-6.006 31.868-36.856 11.922-71.81-9.07-167.31-36.093-233.78 13.362-23.473 8.022-40.975-13.737-40.858z"/>
        </g>
        <g transform="translate(-3, 8) scale(0.25)">
          <path fill="#DDD6FE" d="M433.79 59.602c-8.94.047-20.654 3.077-34.966 9.876C295.2 62.252 170.14 77.352 86.788 103.535c-60.407-27.913-70.404-.426-42.95 36.186C10.242 239.454 24.97 340.803 60.7 413.31c-11.01 47.633 16.965 45.498 41.172 26.452 170.77 9.1 281.83-16.52 349.88-68.666 24.01 19.23 41.66-6.006 31.868-36.856 11.922-71.81-9.07-167.31-36.093-233.78 13.362-23.473 8.022-40.975-13.737-40.858z"/>
          <path fill="#A78BFA" opacity="0.35" d="M76.404 137.562c52.65 61.045 53.612 200.38 21.748 283.403 7.046-90.91 2.505-223.673-21.748-283.404z"/>
        </g>
        <g fill="#7C3AED" font-family="Arial Black, Arial, sans-serif" font-style="italic" font-weight="900">
          <text x="70" y="40" font-size="30">z</text>
          <text x="90" y="26" font-size="22">z</text>
          <text x="106" y="14" font-size="15">z</text>
        </g>
      </g>
      <text x="62" y="36" font-family="system-ui, sans-serif" font-size="24" font-weight="600" fill="#818CF8">TabRest</text>
    </g>

    <!-- Main headline -->
    <text x="0" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="700" fill="#ffffff">
      Set It &amp; Forget It
    </text>

    <!-- Subheadline -->
    <text x="0" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#9B8FAD">
      Smart automation keeps your browser light
    </text>

    <!-- Features list -->
    <g transform="translate(0, 220)">
      <!-- Timer -->
      <g transform="translate(0, 0)">
        <circle cx="20" cy="20" r="20" fill="rgba(99,102,241,0.2)"/>
        <text x="20" y="27" font-family="system-ui, sans-serif" font-size="18" fill="#A5B4FC" text-anchor="middle">⏱️</text>
        <text x="55" y="18" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#E8E2F4">Auto-unload Timer</text>
        <text x="55" y="40" font-family="system-ui, sans-serif" font-size="14" fill="#9B8FAD">5 minutes to 4 hours, your choice</text>
      </g>

      <!-- RAM threshold -->
      <g transform="translate(0, 80)">
        <circle cx="20" cy="20" r="20" fill="rgba(99,102,241,0.2)"/>
        <text x="20" y="27" font-family="system-ui, sans-serif" font-size="18" fill="#A5B4FC" text-anchor="middle">📊</text>
        <text x="55" y="18" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#E8E2F4">RAM Threshold</text>
        <text x="55" y="40" font-family="system-ui, sans-serif" font-size="14" fill="#9B8FAD">Auto-act when RAM hits 60-95%</text>
      </g>

      <!-- Smart protection -->
      <g transform="translate(0, 160)">
        <circle cx="20" cy="20" r="20" fill="rgba(99,102,241,0.2)"/>
        <text x="20" y="27" font-family="system-ui, sans-serif" font-size="18" fill="#A5B4FC" text-anchor="middle">🎵</text>
        <text x="55" y="18" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#E8E2F4">Smart Protection</text>
        <text x="55" y="40" font-family="system-ui, sans-serif" font-size="14" fill="#9B8FAD">Audio, pinned, forms auto-protected</text>
      </g>
    </g>
  </g>

  <!-- Right side: Screenshot placeholder -->
  <g transform="translate(700, 80)">
    <rect x="0" y="0" width="500" height="640" rx="16" fill="rgba(26,21,40,0.85)" stroke="#4338CA" stroke-width="2.5" stroke-dasharray="10,5"/>

    <text x="250" y="300" font-family="system-ui, sans-serif" font-size="20" fill="#6366F1" text-anchor="middle">📸 SETTINGS SCREENSHOT</text>
    <text x="250" y="335" font-family="system-ui, sans-serif" font-size="14" fill="#9B8FAD" text-anchor="middle">Show timer &amp; threshold options</text>
    <text x="250" y="365" font-family="system-ui, sans-serif" font-size="12" fill="#9B8FAD" text-anchor="middle" opacity="0.6">500 x 640 px</text>

    <!-- Corner guides -->
    <path d="M 16 0 L 0 0 L 0 16" fill="none" stroke="#818CF8" stroke-width="2"/>
    <path d="M 484 0 L 500 0 L 500 16" fill="none" stroke="#818CF8" stroke-width="2"/>
    <path d="M 0 624 L 0 640 L 16 640" fill="none" stroke="#818CF8" stroke-width="2"/>
    <path d="M 500 624 L 500 640 L 484 640" fill="none" stroke="#818CF8" stroke-width="2"/>
  </g>
</svg>
