<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F0B1A"/>
      <stop offset="60%" style="stop-color:#1A1528"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4338CA;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#4338CA;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="url(#bgGradient)"/>
  <rect width="1280" height="800" fill="url(#centerGlow)"/>

  <!-- Centered content -->
  <g transform="translate(640, 400)">
    <!-- Shield icon -->
    <g transform="translate(-70, -300)">
      <!-- Shield shape with gradient -->
      <defs>
        <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#818CF8"/>
          <stop offset="100%" style="stop-color:#4338CA"/>
        </linearGradient>
        <filter id="shieldGlow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="8" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      <!-- Outer glow -->
      <path d="M70 10 L130 30 L130 90 C130 130 100 160 70 180 C40 160 10 130 10 90 L10 30 Z"
            fill="#6366F1" opacity="0.3" filter="url(#shieldGlow)"/>
      <!-- Shield body -->
      <path d="M70 20 L120 38 L120 88 C120 122 95 148 70 165 C45 148 20 122 20 88 L20 38 Z"
            fill="url(#shieldGradient)" stroke="#A5B4FC" stroke-width="2"/>
      <!-- Checkmark -->
      <path d="M45 90 L62 107 L95 70" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Main headline -->
    <text x="0" y="-40" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#ffffff" text-anchor="middle">
      Your Data Stays Local
    </text>

    <!-- Subheadline -->
    <text x="0" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#9B8FAD" text-anchor="middle">
      Privacy-first. Local by default. Opt-in only.
    </text>

    <!-- Privacy features - 3 columns -->
    <g transform="translate(-400, 80)">
      <!-- No tracking -->
      <g transform="translate(0, 0)">
        <circle cx="130" cy="30" r="28" fill="rgba(99,102,241,0.15)"/>
        <g transform="translate(118, 18)" stroke="#A5B4FC" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/>
          <line x1="5.5" y1="18.5" x2="18.5" y2="5.5"/>
        </g>
        <text x="130" y="80" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#E8E2F4" text-anchor="middle">No Auto-Collect</text>
        <text x="130" y="105" font-family="system-ui, sans-serif" font-size="14" fill="#9B8FAD" text-anchor="middle">Reporting is opt-in</text>
      </g>

      <!-- Local storage -->
      <g transform="translate(270, 0)">
        <circle cx="130" cy="30" r="28" fill="rgba(99,102,241,0.15)"/>
        <g transform="translate(118, 18)" stroke="#A5B4FC" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <ellipse cx="12" cy="6" rx="8" ry="2.5"/>
          <path d="M4 6v12c0 1.4 3.6 2.5 8 2.5s8-1.1 8-2.5V6"/>
          <path d="M4 12c0 1.4 3.6 2.5 8 2.5s8-1.1 8-2.5"/>
        </g>
        <text x="130" y="80" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#E8E2F4" text-anchor="middle">Local Storage</text>
        <text x="130" y="105" font-family="system-ui, sans-serif" font-size="14" fill="#9B8FAD" text-anchor="middle">Data never leaves</text>
      </g>

      <!-- Open source -->
      <g transform="translate(540, 0)">
        <circle cx="130" cy="30" r="28" fill="rgba(99,102,241,0.15)"/>
        <g transform="translate(118, 18)" stroke="#A5B4FC" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 6c-1.8-1.2-4.2-1.8-7-1.5v14c2.8-0.3 5.2 0.3 7 1.5z"/>
          <path d="M12 6c1.8-1.2 4.2-1.8 7-1.5v14c-2.8-0.3-5.2 0.3-7 1.5z"/>
        </g>
        <text x="130" y="80" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#E8E2F4" text-anchor="middle">Open Source</text>
        <text x="130" y="105" font-family="system-ui, sans-serif" font-size="14" fill="#9B8FAD" text-anchor="middle">Fully transparent</text>
      </g>
    </g>

    <!-- Logo bottom -->
    <g transform="translate(-55, 220)">
      <g transform="scale(0.35)">
        <g transform="translate(0, 12) scale(0.25)">
          <path fill="#8B5CF6" opacity="0.35" d="M433.79 59.602c-8.94.047-20.654 3.077-34.966 9.876C295.2 62.252 170.14 77.352 86.788 103.535c-60.407-27.913-70.404-.426-42.95 36.186C10.242 239.454 24.97 340.803 60.7 413.31c-11.01 47.633 16.965 45.498 41.172 26.452 170.77 9.1 281.83-16.52 349.88-68.666 24.01 19.23 41.66-6.006 31.868-36.856 11.922-71.81-9.07-167.31-36.093-233.78 13.362-23.473 8.022-40.975-13.737-40.858z"/>
        </g>
        <g transform="translate(-3, 8) scale(0.25)">
          <path fill="#DDD6FE" d="M433.79 59.602c-8.94.047-20.654 3.077-34.966 9.876C295.2 62.252 170.14 77.352 86.788 103.535c-60.407-27.913-70.404-.426-42.95 36.186C10.242 239.454 24.97 340.803 60.7 413.31c-11.01 47.633 16.965 45.498 41.172 26.452 170.77 9.1 281.83-16.52 349.88-68.666 24.01 19.23 41.66-6.006 31.868-36.856 11.922-71.81-9.07-167.31-36.093-233.78 13.362-23.473 8.022-40.975-13.737-40.858z"/>
          <path fill="#A78BFA" opacity="0.35" d="M76.404 137.562c52.65 61.045 53.612 200.38 21.748 283.403 7.046-90.91 2.505-223.673-21.748-283.404z"/>
        </g>
        <g fill="#7C3AED" font-family="Arial Black, Arial, sans-serif" font-style="italic" font-weight="900">
          <text x="70" y="40" font-size="30">z</text>
          <text x="90" y="26" font-size="22">z</text>
          <text x="106" y="14" font-size="15">z</text>
        </g>
      </g>
      <text x="55" y="30" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#818CF8">TabRest</text>
    </g>
  </g>
</svg>
