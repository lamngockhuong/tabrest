<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <defs>
    <linearGradient id="bgGradient" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="50%" style="stop-color:#1A1528"/>
      <stop offset="100%" style="stop-color:#0F0B1A"/>
    </linearGradient>
    <radialGradient id="topGlow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" style="stop-color:#4338CA;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#4338CA;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="url(#bgGradient)"/>
  <rect width="1280" height="800" fill="url(#topGlow)"/>

  <!-- Top: Tab list screenshot -->
  <g transform="translate(80, 50)">
    <image href="screenshots/screenshot-06-tab-list.png" x="0" y="0" width="1120" height="320" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <!-- Bottom: Content -->
  <g transform="translate(0, 420)">
    <!-- Main headline - centered -->
    <text x="640" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#ffffff" text-anchor="middle">
      Every Tab, Under Control
    </text>

    <!-- Subheadline -->
    <text x="640" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#9B8FAD" text-anchor="middle">
      Quick actions to manage tabs your way
    </text>

    <!-- Action buttons row -->
    <g transform="translate(270, 180)">
      <!-- Unload Others -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="180" height="50" rx="8" fill="#4338CA"/>
        <text x="90" y="32" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#fff" text-anchor="middle">Unload Others</text>
      </g>

      <!-- Unload Left -->
      <g transform="translate(200, 0)">
        <rect x="0" y="0" width="160" height="50" rx="8" fill="rgba(99,102,241,0.2)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
        <text x="80" y="32" font-family="system-ui, sans-serif" font-size="15" font-weight="500" fill="#A5B4FC" text-anchor="middle">← Unload Left</text>
      </g>

      <!-- Unload Right -->
      <g transform="translate(380, 0)">
        <rect x="0" y="0" width="160" height="50" rx="8" fill="rgba(99,102,241,0.2)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
        <text x="80" y="32" font-family="system-ui, sans-serif" font-size="15" font-weight="500" fill="#A5B4FC" text-anchor="middle">Unload Right →</text>
      </g>

      <!-- Unload Current -->
      <g transform="translate(560, 0)">
        <rect x="0" y="0" width="180" height="50" rx="8" fill="rgba(99,102,241,0.2)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
        <text x="90" y="32" font-family="system-ui, sans-serif" font-size="15" font-weight="500" fill="#A5B4FC" text-anchor="middle">Unload Current</text>
      </g>
    </g>

    <!-- Features row -->
    <g transform="translate(328, 280)">
      <rect x="0" y="0" width="140" height="36" rx="18" fill="rgba(99,102,241,0.15)"/>
      <text x="70" y="24" font-family="system-ui, sans-serif" font-size="13" fill="#A5B4FC" text-anchor="middle">Tab Groups</text>

      <rect x="155" y="0" width="130" height="36" rx="18" fill="rgba(99,102,241,0.15)"/>
      <text x="220" y="24" font-family="system-ui, sans-serif" font-size="13" fill="#A5B4FC" text-anchor="middle">Whitelist</text>

      <rect x="300" y="0" width="160" height="36" rx="18" fill="rgba(99,102,241,0.15)"/>
      <text x="380" y="24" font-family="system-ui, sans-serif" font-size="13" fill="#A5B4FC" text-anchor="middle">Keyboard Shortcuts</text>

      <rect x="475" y="0" width="150" height="36" rx="18" fill="rgba(99,102,241,0.15)"/>
      <text x="550" y="24" font-family="system-ui, sans-serif" font-size="13" fill="#A5B4FC" text-anchor="middle">Context Menu</text>
    </g>

    <!-- Logo bottom right -->
    <g transform="translate(1080, 260)">
      <g transform="scale(0.35)">
        <g transform="translate(0, 12) scale(0.25)">
          <path fill="#8B5CF6" opacity="0.35" d="M433.79 59.602c-8.94.047-20.654 3.077-34.966 9.876C295.2 62.252 170.14 77.352 86.788 103.535c-60.407-27.913-70.404-.426-42.95 36.186C10.242 239.454 24.97 340.803 60.7 413.31c-11.01 47.633 16.965 45.498 41.172 26.452 170.77 9.1 281.83-16.52 349.88-68.666 24.01 19.23 41.66-6.006 31.868-36.856 11.922-71.81-9.07-167.31-36.093-233.78 13.362-23.473 8.022-40.975-13.737-40.858z"/>
        </g>
        <g transform="translate(-3, 8) scale(0.25)">
          <path fill="#DDD6FE" d="M433.79 59.602c-8.94.047-20.654 3.077-34.966 9.876C295.2 62.252 170.14 77.352 86.788 103.535c-60.407-27.913-70.404-.426-42.95 36.186C10.242 239.454 24.97 340.803 60.7 413.31c-11.01 47.633 16.965 45.498 41.172 26.452 170.77 9.1 281.83-16.52 349.88-68.666 24.01 19.23 41.66-6.006 31.868-36.856 11.922-71.81-9.07-167.31-36.093-233.78 13.362-23.473 8.022-40.975-13.737-40.858z"/>
          <path fill="#A78BFA" opacity="0.35" d="M76.404 137.562c52.65 61.045 53.612 200.38 21.748 283.403 7.046-90.91 2.505-223.673-21.748-283.404z"/>
        </g>
        <g fill="#7C3AED" font-family="Arial Black, Arial, sans-serif" font-style="italic" font-weight="900">
          <text x="70" y="40" font-size="30">z</text>
          <text x="90" y="26" font-size="22">z</text>
          <text x="106" y="14" font-size="15">z</text>
        </g>
      </g>
      <text x="55" y="30" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#818CF8">TabRest</text>
    </g>
  </g>
</svg>
